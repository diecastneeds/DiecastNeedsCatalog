name: Build Catalog

on:
  push:
    paths:
      - 'products.xml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build HTML catalog
        run: python build.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html descs.json
          git commit -m "Rebuild catalog from updated XML"
          git push
